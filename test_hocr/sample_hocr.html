<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <title>Sample hOCR Document</title>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name='ocr-system' content='tesseract 5.3.0' />
  <meta name='ocr-capabilities' content='ocr_page ocr_carea ocr_par ocr_line ocrx_word ocrp_wconf'/>
</head>
<body>
  <!-- Page 1 -->
  <div class='ocr_page' id='page_1' title='bbox 0 0 2550 3300; ppageno 0'>
    <!-- Content area 1 -->
    <div class='ocr_carea' id='block_1_1' title="bbox 100 200 2450 3100">
      <!-- Paragraph 1 -->
      <p class='ocr_par' id='par_1_1' lang='zho' title="bbox 100 200 2450 500">
        <!-- Text line 1 -->
        <span class='ocr_line' id='line_1_1' title="bbox 100 200 2450 250; baseline -0.002 -5; x_size 45; x_descenders 10; x_ascenders 10">
          <span class='ocrx_word' id='word_1_1' title='bbox 100 200 300 250; x_wconf 95'>This is the first</span>
          <span class='ocrx_word' id='word_1_2' title='bbox 310 200 510 250; x_wconf 92'>English word</span>
          <span class='ocrx_word' id='word_1_3' title='bbox 520 200 720 250; x_wconf 88'>Sample text</span>
        </span>
        <!-- Text line 2 -->
        <span class='ocr_line' id='line_1_2' title="bbox 100 260 2450 310; baseline -0.001 -6; x_size 45; x_descenders 10; x_ascenders 10">
          <span class='ocrx_word' id='word_1_4' title='bbox 100 260 250 310; x_wconf 90'>PDF compression</span>
          <span class='ocrx_word' id='word_1_5' title='bbox 260 260 410 310; x_wconf 93'>and split</span>
          <span class='ocrx_word' id='word_1_6' title='bbox 420 260 620 310; x_wconf 89'>Tool Development</span>
        </span>
      </p>
      <!-- Paragraph 2 -->
      <p class='ocr_par' id='par_1_2' lang='eng' title="bbox 100 520 2450 800">
        <!-- Text line 3 -->
        <span class='ocr_line' id='line_1_3' title="bbox 100 520 2000 570; baseline -0.003 -7; x_size 44; x_descenders 9; x_ascenders 11">
          <span class='ocrx_word' id='word_1_7' title='bbox 100 520 200 570; x_wconf 96'>This</span>
          <span class='ocrx_word' id='word_1_8' title='bbox 210 520 250 570; x_wconf 97'>is</span>
          <span class='ocrx_word' id='word_1_9' title='bbox 260 520 290 570; x_wconf 95'>an</span>
          <span class='ocrx_word' id='word_1_10' title='bbox 300 520 420 570; x_wconf 94'>example</span>
          <span class='ocrx_word' id='word_1_11' title='bbox 430 520 450 570; x_wconf 98'>of</span>
          <span class='ocrx_word' id='word_1_12' title='bbox 460 520 580 570; x_wconf 91'>English</span>
          <span class='ocrx_word' id='word_1_13' title='bbox 590 520 650 570; x_wconf 93'>text.</span>
        </span>
      </p>
    </div>
  </div>
  
  <!-- Page 2 -->
  <div class='ocr_page' id='page_2' title='bbox 0 0 2550 3300; ppageno 1'>
    <div class='ocr_carea' id='block_2_1' title="bbox 100 200 2450 3100">
      <p class='ocr_par' id='par_2_1' lang='zho' title="bbox 100 200 2450 500">
        <span class='ocr_line' id='line_2_1' title="bbox 100 200 2450 250; baseline -0.002 -5; x_size 45; x_descenders 10; x_ascenders 10">
          <span class='ocrx_word' id='word_2_1' title='bbox 100 200 300 250; x_wconf 95'>Second page</span>
          <span class='ocrx_word' id='word_2_2' title='bbox 310 200 510 250; x_wconf 92'>Content example</span>
        </span>
      </p>
    </div>
  </div>
</body>
</html>
